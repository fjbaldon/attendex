spring.application.name=platform
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://[::1]:5432/attendex}
spring.datasource.username=${DB_USERNAME:attendex}
spring.datasource.password=${DB_PASSWORD:attendex}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.depends_on=flyway

spring.flyway.enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend.url=${FRONTEND_URL:http://localhost:3000}
